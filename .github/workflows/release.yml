name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test before release
    strategy:
      fail-fast: true
      matrix:
        ruby:
          - "3.4"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      gem_name: ${{ steps.build.outputs.gem_name }}
      version: ${{ steps.build.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Verify tag matches gem version
        run: |
          GEM_VERSION=$(ruby -r ./lib/phlex_forms/version -e "puts PhlexForms::VERSION")
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$GEM_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match gem version ($GEM_VERSION)"
            exit 1
          fi

      - name: Build gem
        id: build
        run: |
          gem build phlex-forms.gemspec --strict
          GEM_NAME=$(ls phlex-forms-*.gem)
          echo "gem_name=$GEM_NAME" >> "$GITHUB_OUTPUT"
          TAG_VERSION="${{ github.event.release.tag_name }}"
          echo "version=${TAG_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Verify gem contents
        run: |
          GEM_NAME=$(ls phlex-forms-*.gem)
          gem unpack "$GEM_NAME" --target /tmp/gem-verify
          UNWANTED=$(find /tmp/gem-verify \( -name ".git*" -o -name "*.gemspec" \) -print)
          if [ -n "$UNWANTED" ]; then
            echo "::error::Unwanted files found in gem:"; echo "$UNWANTED"; exit 1
          fi
          UNWANTED_DIRS=$(find /tmp/gem-verify -type d \( -name "spec" -o -name "test" \) -print)
          if [ -n "$UNWANTED_DIRS" ]; then
            echo "::error::Unwanted directories found in gem:"; echo "$UNWANTED_DIRS"; exit 1
          fi
          echo "No unwanted files found"

      - name: Generate checksums
        run: |
          GEM_NAME=$(ls phlex-forms-*.gem)
          sha256sum "$GEM_NAME" > "$GEM_NAME.sha256"
          sha512sum "$GEM_NAME" > "$GEM_NAME.sha512"

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem
          path: |
            phlex-forms-*.gem
            phlex-forms-*.gem.sha256
            phlex-forms-*.gem.sha512
          if-no-files-found: error

  publish-rubygems:
    needs: build
    runs-on: ubuntu-latest
    environment: rubygems
    permissions:
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: gem

      - name: Verify checksums
        run: |
          sha256sum -c phlex-forms-*.gem.sha256
          sha512sum -c phlex-forms-*.gem.sha512

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Configure RubyGems trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@bc6dd217f8a4f919d6835fcfefd470ef821f5c44 # v1.0.0

      - name: Push to RubyGems with Sigstore attestation
        run: |
          GEM_NAME=$(ls phlex-forms-*.gem)
          VERSION="${GEM_NAME%.gem}"
          VERSION="${VERSION#phlex-forms-}"
          if gem info phlex-forms --exact --remote 2>/dev/null | grep -q "phlex-forms ($VERSION)"; then
            echo "::warning::Version $VERSION already published to RubyGems, skipping push"
          else
            gem exec sigstore-cli sign "$GEM_NAME" --bundle "$GEM_NAME.sigstore.json"
            gem push "$GEM_NAME" --attestation "$GEM_NAME.sigstore.json"
          fi

      - name: Upload Sigstore bundle
        uses: actions/upload-artifact@v4
        with:
          name: sigstore
          path: phlex-forms-*.gem.sigstore.json
          if-no-files-found: error

  upload-release-assets:
    needs: [build, publish-rubygems]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: gem
      - uses: actions/download-artifact@v4
        with:
          name: sigstore
      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GEM_NAME="${{ needs.build.outputs.gem_name }}"
          gh release upload "${{ github.event.release.tag_name }}" \
            "$GEM_NAME" \
            "$GEM_NAME.sha256" \
            "$GEM_NAME.sha512" \
            "$GEM_NAME.sigstore.json" \
            --repo "${{ github.repository }}" \
            --clobber
