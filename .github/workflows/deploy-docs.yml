name: Deploy docs
# Build + deploy via docs-kit's reusable workflow (defined once for all sites).
on:
  release: { types: [published] }
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  deploy:
    uses: mhenrixon/docs-kit/.github/workflows/deploy.yml@main
    with:
      image: mhenrixon/phlex-forms
      service: phlex-forms
    secrets: inherit
