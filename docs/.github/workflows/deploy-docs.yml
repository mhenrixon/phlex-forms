name: Deploy docs
# Inert copy — GitHub runs the caller at the REPO ROOT .github/workflows/.
# Kept in sync so `docs/` stays a self-describing docs-kit scaffold.
on:
  release: { types: [published] }
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  deploy:
    uses: mhenrixon/docs-kit/.github/workflows/deploy.yml@main
    with:
      image: mhenrixon/phlex-forms
      service: phlex-forms
    secrets: inherit
